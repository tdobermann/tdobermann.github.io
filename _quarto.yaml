# ============================================================
# FILE: _quarto.yml
# ============================================================
project:
  type: website
  output-dir: _site

website:
  title: "Tim Dobermann"
  description: "Director of Research & Environmental Economist"
  site-url: "https://www.timdobermann.com"
  favicon: favicon.png

  # Open Graph metadata — controls how links render on LinkedIn/Twitter
  open-graph:
    locale: en_US
    site-name: "Tim Dobermann"
  twitter-card:
    card-style: summary

  page-footer:
    center: "© 2026 Tim Dobermann"

  navbar:
    background: light
    pinned: true
    left:
      - text: "Home"
        file: index.qmd
      - text: "Research & Policy"
        file: research.qmd
      - text: "Media"
        file: media.qmd
      - text: "CV"
        href: cv.pdf
        target: _blank
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/tim-dobermann
        aria-label: LinkedIn
      - icon: mortarboard-fill
        href: https://scholar.google.com/citations?user=YOUR_ID
        aria-label: Google Scholar
      - icon: github
        href: https://github.com/
        aria-label: GitHub

format:
  html:
    theme:
      light: flatly
    css: styles.css
    toc: false # Override per-page as needed
    mainfont: "Charter, 'Bitstream Charter', 'Noto Serif', Georgia, serif"
    fontsize: "1.05rem"
    linestretch: 1.6


