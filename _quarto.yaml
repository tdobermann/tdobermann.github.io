# ============================================================
# DIRECTORY STRUCTURE
# ============================================================
# my-website/
# ├── _quarto.yml
# ├── index.qmd
# ├── research.qmd
# ├── media.qmd
# ├── styles.css
# ├── profile.jpg
# ├── favicon.png
