#
# I am the Director of Research at the [International Growth Centre](https://www.theigc.org/)
# and a Research Fellow in Environmental Economics at the
# [London School of Economics](https://www.lse.ac.uk/).
#
# My research sits at the intersection of environmental economics, public finance,
# and structural transformation in low- and middle-income countries. I advise
# governments across Asia and Africa on energy sector design and the distributional
# consequences of climate change.
#
# ### Research Themes
#
# **Energy transition in emerging markets** — Evaluating power purchase agreements,
# grid investment, and tariff reform in Pakistan, Myanmar, and East Africa.
#
# **Climate change and poverty** — Estimating the localized welfare costs of
# extreme weather events using high-resolution spatial data.
#
# **Structural transformation and land use** — Public finance instruments and
# land-use optimization for sustainable growth corridors.


